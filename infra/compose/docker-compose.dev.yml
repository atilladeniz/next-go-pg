name: next-go-pg

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nextgopg
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextgopg"]
      interval: 2s
      timeout: 5s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    environment:
      - MP_UI_AUTH_FILE=
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true

  # ─── AI dev stack (opt-in profile: `docker compose --profile ai up`) ───
  # Started via `just ai-up` / stopped via `just ai-down`. Excluded from
  # the default dev stack to keep first-time setup light (Ollama models
  # alone are ~5 GB).

  hatchet-lite:
    # Pin to v0.84.0 — the matching Go SDK in this repo is v0.86.x; v0.46 is
    # too old (missing v1.AdminService RPC). v0.84 is Postgres-only, no
    # RabbitMQ. Stock image hardcodes `--skip certs`, which then makes the
    # server fail to load TLS. We override the entrypoint to let quickstart
    # generate self-signed certs.
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:v0.84.0
    profiles: ["ai"]
    entrypoint: ["/usr/local/bin/hatchet-entrypoint.sh"]
    ports:
      - "127.0.0.1:8888:8080"   # dashboard (host-bound)
      - "127.0.0.1:7077:7077"   # gRPC (host-bound — dev backend on host dials this)
    volumes:
      - ./hatchet-init/entrypoint.sh:/usr/local/bin/hatchet-entrypoint.sh:ro
      - hatchet_config:/config
    environment:
      # DATABASE_URL is read by the migration step (`atlas-apply.sh`).
      DATABASE_URL: postgres://postgres:postgres@db:5432/hatchet?sslmode=disable
      # DATABASE_POSTGRES_* are read by the quickstart/seed step and by the
      # running server (viper-bound config). Without these the seed step
      # falls back to the embedded-postgres defaults (127.0.0.1:5431).
      DATABASE_POSTGRES_HOST: db
      DATABASE_POSTGRES_PORT: "5432"
      DATABASE_POSTGRES_USERNAME: postgres
      DATABASE_POSTGRES_PASSWORD: postgres
      DATABASE_POSTGRES_DB_NAME: hatchet
      DATABASE_POSTGRES_SSL_MODE: disable
      SERVER_PORT: "8080"
      SERVER_GRPC_PORT: "7077"
      SERVER_GRPC_BIND_ADDRESS: 0.0.0.0
      # Broadcast address is what Hatchet tells workers to dial. Dev backend
      # runs on the host (not in docker), so 127.0.0.1:7077 is correct.
      # Promoting to a containerised backend later requires re-pointing this.
      SERVER_GRPC_BROADCAST_ADDRESS: 127.0.0.1:7077
      SERVER_GRPC_INSECURE: "true"
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_AUTH_COOKIE_INSECURE: "true"
      SERVER_DEFAULT_ENGINE_VERSION: v1
    depends_on:
      db:
        condition: service_healthy

  ollama:
    image: ollama/ollama:0.5.1
    profiles: ["ai"]
    ports:
      - "127.0.0.1:11434:11434"   # host-bound — dev backend on host dials this
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "5m"
      OLLAMA_HOST: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
  ollama_data:
  hatchet_config:
