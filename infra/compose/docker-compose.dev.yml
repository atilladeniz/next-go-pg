name: next-go-pg

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nextgopg
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextgopg"]
      interval: 2s
      timeout: 5s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    environment:
      - MP_UI_AUTH_FILE=
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true

  # ─── AI dev stack (opt-in profile: `docker compose --profile ai up`) ───
  # Started via `just ai-up` / stopped via `just ai-down`. Excluded from
  # the default dev stack to keep first-time setup light (Ollama models
  # alone are ~5 GB).

  hatchet-lite:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:v0.46.0
    profiles: ["ai"]
    ports:
      - "8888:8080"   # dashboard (host → container internal 8080)
    expose:
      - "7077"        # gRPC, docker-network only (backend worker uses this)
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/hatchet?sslmode=disable
      SERVER_PORT: "8080"
      SERVER_GRPC_PORT: "7077"
      SERVER_GRPC_BIND_ADDRESS: 0.0.0.0
      SERVER_GRPC_BROADCAST_ADDRESS: hatchet-lite:7077
      SERVER_GRPC_INSECURE: "true"
      SERVER_TLS_STRATEGY: none
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_AUTH_COOKIE_INSECURE: "true"
      SERVER_DEFAULT_ENGINE_VERSION: v1
      HATCHET_CLIENT_TLS_STRATEGY: none
    depends_on:
      db:
        condition: service_healthy

  ollama:
    image: ollama/ollama:0.5.1
    profiles: ["ai"]
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "5m"
      OLLAMA_HOST: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
  ollama_data:
