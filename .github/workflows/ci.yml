name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions for security features
permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  # =============================================================================
  # Dependency Review (Security)
  # =============================================================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, CC0-1.0, Unlicense, MPL-2.0, LicenseRef-scancode-google-patent-license-golang

  # =============================================================================
  # Backend (Go)
  # =============================================================================
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend

  backend-security:
    name: Backend Security (gosec)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -exclude-dir=docs -no-fail ./...

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Run tests
        run: go test ./... -race

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-security, backend-test]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build -o bin/server ./cmd/server

  # =============================================================================
  # Frontend (Next.js)
  # =============================================================================
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bun run biome check .

      - name: Run Steiger (FSD lint)
        run: bunx steiger src

  frontend-typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript check
        run: bun run typecheck

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:run

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-typecheck, frontend-test]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/bun.lock') }}-${{ hashFiles('frontend/src/**/*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/bun.lock') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # Skip DB connection during build
          SKIP_ENV_VALIDATION: true

  # =============================================================================
  # Docker Build Verification
  # =============================================================================
  # Detect which areas changed so docs-only PRs can skip the Docker rebuilds.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Explicit allow-lists per area. We do not use `!` negation
          # patterns: in dorny/paths-filter v3 they can cause false
          # positives when no inclusion pattern matches (e.g. a root
          # CHANGELOG.md was matching `backend` and `frontend`).
          filters: |
            backend:
              - 'backend/**/*.go'
              - 'backend/go.mod'
              - 'backend/go.sum'
              - 'backend/Dockerfile'
              - 'backend/.dockerignore'
              - 'backend/migrations/**'
              - 'backend/docs/**'
              - 'infra/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/src/**'
              - 'frontend/public/**'
              - 'frontend/package.json'
              - 'frontend/bun.lock'
              - 'frontend/bunfig.toml'
              - 'frontend/Dockerfile'
              - 'frontend/.dockerignore'
              - 'frontend/next.config.ts'
              - 'frontend/tsconfig.json'
              - 'frontend/biome.json'
              - 'frontend/orval.config.ts'
              - 'frontend/postcss.config.mjs'
              - 'frontend/components.json'
              - 'infra/**'
              - '.github/workflows/ci.yml'

  docker-build-backend:
    name: Docker Build Backend
    runs-on: ubuntu-latest
    needs: [backend-build, changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  docker-build-frontend:
    name: Docker Build Frontend
    runs-on: ubuntu-latest
    needs: [frontend-build, changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          platforms: linux/amd64
          build-args: |
            SKIP_ENV_VALIDATION=true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # Summary gate so branch protection's required "Docker Build Check"
  # status keeps working — passes when both sub-builds passed or were
  # skipped, fails if either actually failed.
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [docker-build-backend, docker-build-frontend]
    if: github.event_name == 'pull_request' && !cancelled()
    steps:
      - name: Aggregate sub-build results
        env:
          BACKEND: ${{ needs.docker-build-backend.result }}
          FRONTEND: ${{ needs.docker-build-frontend.result }}
        run: |
          echo "Backend:  $BACKEND"
          echo "Frontend: $FRONTEND"
          if [[ "$BACKEND" == "failure" || "$FRONTEND" == "failure" ]]; then
            echo "::error::A Docker sub-build failed"
            exit 1
          fi
          if [[ "$BACKEND" == "cancelled" || "$FRONTEND" == "cancelled" ]]; then
            echo "::error::A Docker sub-build was cancelled"
            exit 1
          fi

  # =============================================================================
  # Security
  # =============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
